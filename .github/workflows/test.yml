name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    name: pytest (${{ matrix.os }} · Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          uv sync --all-extras

      - name: Run pytest
        run: |
          uv run pytest tests/ -v --tb=short -m "not integration"

      - name: Mypy strict on tools/
        # Gate added R4.4 (v1.7): see references/tools-spec.md §10 coverage invariant.
        # R3.8 closed 14 → 0 errors across 28 source files; this gate prevents regression.
        # Runs ubuntu + 3.12 only — mypy results are OS-independent; pinning Python
        # version avoids cross-version typing module drift and saves 5× CI time.
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: |
          uv run mypy --strict tools/

      - name: Run ruff (lint)
        # R-1.8.0-013 deep-audit fix: removed continue-on-error so lint
        # regressions block the merge. Existing baseline must stay clean;
        # if ruff fails, fix the lint or update the rule config — don't
        # silently let it through.
        run: |
          uv run ruff check tools/ tests/

  bash-syntax:
    name: Bash scripts (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # windows-latest (Windows Server) ships Git for Windows which
        # includes a bash (MSYS2). All hook tests are verified portable
        # on MSYS bash 5.x and run on every runner (R3.6, v1.7).
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        # Force bash on Windows too — actions/checkout's default shell on
        # windows-latest is PowerShell.
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Check bash syntax (all runners)
        # R-1.8.0-013 deep-audit fix: enumerate via `git ls-files '*.sh'`
        # so any new shell file added under any directory (including
        # scripts/lib/, scripts/cron/, future dirs) is automatically
        # checked. Previous fixed-glob approach silently skipped
        # scripts/lib/*.sh which contained real shell logic (audit-trail.sh,
        # sha-fallback.sh).
        run: |
          failed=0
          while IFS= read -r script; do
            echo "Checking $script..."
            if ! bash -n "$script"; then
              failed=1
            fi
          done < <(git ls-files '*.sh')
          exit $failed

      - name: Run hook test suite (all runners)
        run: |
          chmod +x tests/hooks/*.sh || true
          failed=0
          for s in tests/hooks/test_*.sh; do
            echo "── $s ──"
            if ! bash "$s"; then
              failed=1
            fi
          done
          exit $failed

      - name: Verify hook script regex (all runners)
        run: |
          # Smoke test: hook should detect '上朝' as trigger
          chmod +x scripts/lifeos-pre-prompt-guard.sh || true
          OUTPUT=$(echo '{"prompt":"上朝"}' | bash scripts/lifeos-pre-prompt-guard.sh)
          echo "$OUTPUT" | grep -q "HARD RULE" || (echo "❌ Hook did not inject reminder for '上朝'" && exit 1)
          # Long pasted content should NOT trigger
          LONG=$(printf '%.0sx' {1..600})
          OUTPUT=$(echo "{\"prompt\":\"$LONG\"}" | bash scripts/lifeos-pre-prompt-guard.sh)
          if echo "$OUTPUT" | grep -q "HARD RULE"; then
            echo "❌ Hook fired on 600-char prompt (false positive)"
            exit 1
          fi
          echo "✅ Hook regex OK"

      - name: Verify compliance check (all runners)
        # R-1.8.0-013 round-5 audit fix: fixture must include the 6 H2
        # sections + version markers + Cortex status (matches what
        # tests/test_compliance_check.py uses post-R-1.8.0-013, which
        # itself was caught failing in round-4 audit). Otherwise the
        # checker bails on `C (P0): briefing-completeness failed` and
        # this CI step turns red.
        run: |
          chmod +x scripts/lifeos-compliance-check.sh || true
          tmpdir=$(mktemp -d)
          cat > "$tmpdir/clean.md" <<'EOF'
          🌅 Trigger: 上朝 → Theme: 三省六部 → Action: Launch(retrospective) Mode 0
          ✅ I am the RETROSPECTIVE subagent (Mode 0, not main context simulation)
          Step 2 DIRECTORY TYPE CHECK:
          a) 连接到 second-brain
          b) 开发模式
          c) 新建 second-brain
          [Local SKILL.md version: 1.8.0]
          [Remote check (forced fresh): up-to-date]
          [Cortex: skipped - per-message pull mode in v1.8.0]
          ## 0. <display name> · 上朝准备
          Ready

          ## 1. 第二大脑同步状态
          Clean

          ## 2. SOUL Health 报告
          No drift

          ## 3. DREAM / 隔夜更新
          None

          ## 4. Today's Focus + 待陛下圣裁
          Ready

          ## 5. 系统状态
          Green
          EOF
          bash scripts/lifeos-compliance-check.sh "$tmpdir/clean.md" start-session-compliance
