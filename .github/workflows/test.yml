name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    name: pytest (${{ matrix.os }} · Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          uv sync --extra dev

      - name: Run pytest
        run: |
          uv run pytest tests/ -v --tb=short -m "not integration"

      - name: Run mypy (type check)
        run: |
          uv run mypy tools/ --ignore-missing-imports
        continue-on-error: true  # type errors are warnings, not blockers in alpha

      - name: Run ruff (lint)
        run: |
          uv run ruff check tools/ tests/
        continue-on-error: true

  bash-syntax:
    name: Bash scripts (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # windows-latest (Windows Server) ships Git for Windows which
        # includes a bash (MSYS2). Most of our hook tests are portable,
        # but a few use GNU-specific tools (od flags, mktemp defaults);
        # those are gated on runner.os != 'Windows' below.
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        # Force bash on Windows too — actions/checkout's default shell on
        # windows-latest is PowerShell.
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Check bash syntax (all runners)
        run: |
          for script in scripts/*.sh scripts/hooks/*.sh evals/run-eval.sh; do
            if [ -f "$script" ]; then
              echo "Checking $script..."
              bash -n "$script"
            fi
          done

      - name: Run hook test suite (Linux + macOS only)
        if: runner.os != 'Windows'
        run: |
          chmod +x tests/hooks/*.sh
          failed=0
          for s in tests/hooks/test_*.sh; do
            echo "── $s ──"
            if ! bash "$s"; then
              failed=1
            fi
          done
          exit $failed

      - name: Run hook test suite (Windows, portable subset)
        if: runner.os == 'Windows'
        run: |
          # Windows Git Bash ships MSYS coreutils. Some tests relying on
          # GNU-specific tools (od -An -tx1, /dev/stdin in subshells) may
          # behave differently; the jq-free setup-hooks test is known
          # portable. Add others here as they're verified on Windows.
          failed=0
          for s in tests/hooks/test_setup_hooks.sh; do
            echo "── $s ──"
            if ! bash "$s"; then
              failed=1
            fi
          done
          exit $failed

      - name: Verify hook script regex (Linux + macOS only)
        if: runner.os != 'Windows'
        run: |
          # Smoke test: hook should detect '上朝' as trigger
          chmod +x scripts/lifeos-pre-prompt-guard.sh
          OUTPUT=$(echo '{"prompt":"上朝"}' | bash scripts/lifeos-pre-prompt-guard.sh)
          echo "$OUTPUT" | grep -q "HARD RULE" || (echo "❌ Hook did not inject reminder for '上朝'" && exit 1)
          # Long pasted content should NOT trigger
          LONG=$(printf '%.0sx' {1..600})
          OUTPUT=$(echo "{\"prompt\":\"$LONG\"}" | bash scripts/lifeos-pre-prompt-guard.sh)
          if echo "$OUTPUT" | grep -q "HARD RULE"; then
            echo "❌ Hook fired on 600-char prompt (false positive)"
            exit 1
          fi
          echo "✅ Hook regex OK"

      - name: Verify compliance check (Linux + macOS only)
        if: runner.os != 'Windows'
        run: |
          chmod +x scripts/lifeos-compliance-check.sh
          # Synthetic clean output should pass
          mkdir -p /tmp/cc-test
          cat > /tmp/cc-test/clean.md <<'EOF'
          🌅 Trigger: 上朝 → Theme: 三省六部 → Action: Launch(retrospective) Mode 0
          ✅ I am the RETROSPECTIVE subagent (Mode 0, not main context simulation)
          a) 连接到 second-brain
          b) 开发模式
          EOF
          cd / && bash $GITHUB_WORKSPACE/scripts/lifeos-compliance-check.sh /tmp/cc-test/clean.md start-session-compliance
